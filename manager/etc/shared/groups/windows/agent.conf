<!--
  ============================================================================
  SentinelCore - Windows Agent Group Configuration
  ============================================================================
  Applied to agents in the "windows" group. Overrides default agent.conf.
  ============================================================================
-->

<agent_config os="Windows">

  <!-- ============================= -->
  <!-- File Integrity Monitoring     -->
  <!-- ============================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Windows-specific directories -->
    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers\etc</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\wbem</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\WindowsPowerShell</directories>
    <directories check_all="yes">C:\Program Files</directories>
    <directories check_all="yes">C:\Program Files (x86)</directories>

    <!-- Registry monitoring -->
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\batfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\cmdfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\comfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\exefile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\piffile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\AllFilesystemObjects</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\Directory</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\Folder</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Windows</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager\KnownDLLs</windows_registry>

    <!-- Ignore noisy paths -->
    <ignore type="sregex">.log$|.tmp$</ignore>
  </syscheck>

  <!-- ============================= -->
  <!-- Log Collection (Windows)      -->
  <!-- ============================= -->

  <!-- Windows Event Channels -->
  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 5145 and EventID != 5156 and EventID != 5447 and EventID != 4656 and EventID != 4658 and EventID != 4663 and EventID != 4660 and EventID != 4670 and EventID != 4690 and EventID != 4703]</query>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Sysmon (if installed) -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- PowerShell Logs -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Defender -->
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Firewall -->
  <localfile>
    <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ============================= -->
  <!-- Active Response (Windows)     -->
  <!-- ============================= -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ============================= -->
  <!-- System Inventory (Windows)    -->
  <!-- ============================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

</agent_config>
