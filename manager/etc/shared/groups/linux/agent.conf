<!--
  ============================================================================
  SentinelCore - Linux Agent Group Configuration
  ============================================================================
  Applied to agents in the "linux" group. Overrides default agent.conf.
  ============================================================================
-->

<agent_config os="Linux">

  <!-- ============================= -->
  <!-- File Integrity Monitoring     -->
  <!-- ============================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Linux-specific directories -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" realtime="yes">/bin,/sbin</directories>
    <directories check_all="yes" realtime="yes">/boot</directories>
    <directories check_all="yes">/opt</directories>

    <!-- Crontab monitoring -->
    <directories check_all="yes" realtime="yes">/var/spool/cron</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.d</directories>

    <!-- Ignore noisy Linux paths -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/prelink.cache</ignore>
    <ignore>/etc/dnf/modules.d</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$</ignore>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- ============================= -->
  <!-- Log Collection (Linux)        -->
  <!-- ============================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Monitor command outputs -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!-- ============================= -->
  <!-- Active Response (Linux)       -->
  <!-- ============================= -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ============================= -->
  <!-- Vulnerability Detection       -->
  <!-- ============================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <packages>yes</packages>
    <hotfixes>yes</hotfixes>
  </wodle>

</agent_config>
