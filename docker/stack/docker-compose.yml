# ============================================================================
# SentinelCore - Full Stack Docker Compose
# ============================================================================
# Runs Wazuh Manager + Indexer + Dashboard in Docker.
#
# Usage:
#   1. Generate certificates:  docker-compose -f generate-certs.yml run --rm generator
#   2. Start the stack:        docker-compose up -d
#   3. Access dashboard:       https://localhost:443
#   4. Default credentials:    admin / SecretPassword
#
# Then run agents (from docker/agents/) with:
#   export MANAGER_IP=<your_host_ip>
#   docker-compose up -d --build
# ============================================================================

services:
  # ─── Wazuh Indexer ──────────────────────────────────────────────────────
  sentinelcore-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    container_name: sentinelcore-indexer
    hostname: sentinelcore-indexer
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/sentinelcore-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer-key.pem
      - ./config/wazuh_indexer_ssl_certs/sentinelcore-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    networks:
      - sentinelcore-net

  # ─── Wazuh Manager ─────────────────────────────────────────────────────
  sentinelcore-manager:
    image: wazuh/wazuh-manager:4.9.0
    container_name: sentinelcore-manager
    hostname: sentinelcore-manager
    restart: unless-stopped
    ports:
      - "1514:1514"       # Agent communication
      - "1515:1515"       # Agent registration
      - "514:514/udp"     # Syslog
      - "55000:55000"     # API
    environment:
      - INDEXER_URL=https://sentinelcore-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat-key.pem
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - manager-api-configuration:/var/ossec/api/configuration
      - manager-etc:/var/ossec/etc
      - manager-logs:/var/ossec/logs
      - manager-queue:/var/ossec/queue
      - manager-var-multigroups:/var/ossec/var/multigroups
      - manager-integrations:/var/ossec/integrations
      - manager-active-response:/var/ossec/active-response/bin
      - manager-agentless:/var/ossec/agentless
      - manager-wodles:/var/ossec/wodles
      - filebeat-etc:/etc/filebeat
      - filebeat-var:/var/lib/filebeat
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/sentinelcore-manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/sentinelcore-manager-key.pem:/etc/ssl/filebeat-key.pem
      - ./config/wazuh_manager/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
    depends_on:
      - sentinelcore-indexer
    networks:
      - sentinelcore-net

# ─── Volumes ────────────────────────────────────────────────────────────
volumes:
  indexer-data:
  manager-api-configuration:
  manager-etc:
  manager-logs:
  manager-queue:
  manager-var-multigroups:
  manager-integrations:
  manager-active-response:
  manager-agentless:
  manager-wodles:
  filebeat-etc:
  filebeat-var:

# ─── Network ────────────────────────────────────────────────────────────
networks:
  sentinelcore-net:
    driver: bridge
